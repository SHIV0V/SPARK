<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Page</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1e1e, #282828);
            color: #f4f4f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header Styles */
        header {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
        }

        header .logo img {
            width: 80px;
            height: 50px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        nav ul li a:hover {
            background-color: #f0db4f;
            color: #333;
        }

        /* Support Container */
        .support-container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.7);
            max-width: 600px;
            width: 100%;
            margin: 50px auto;
            text-align: center;
        }

        .support-container h1 {
            font-size: 2rem;
            color: #f0db4f;
            margin-bottom: 20px;
        }

        .support-container p {
            font-size: 1rem;
            color: #d3d3d3;
            margin-bottom: 30px;
        }

        .support-container form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .support-container input,
        .support-container textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #f0db4f;
            border-radius: 5px;
            background-color: #333;
            color: #f4f4f4;
            font-size: 1rem;
            outline: none;
        }

        .support-container textarea {
            resize: vertical;
            height: 150px;
        }

        .support-container button {
            background: linear-gradient(45deg, #f0db4f, #f8e71c);
            color: #333;
            font-size: 1rem;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .support-container button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .support-container button:active {
            transform: scale(0.98);
        }

        /* Back Button */
        .back-button {
            background: #333;
            color: #f0db4f;
            font-size: 1rem;
            padding: 10px 20px;
            border: 2px solid #f0db4f;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-button:hover {
            background: #f0db4f;
            color: #333;
        }

        /* Thank You Message */
        .thank-you-message {
            display: none;
            font-size: 1.2rem;
            color: #f0db4f;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .thank-you-message.show {
            display: block;
            opacity: 1;
        }

        /* Footer Styles */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        footer p {
            margin: 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="{{ url_for('static', filename='images/sp3.png') }}" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('course_page') }}" onclick="redirectTo(event, '{{ url_for('course_page') }}')">Home</a></li>
                <li><a href="{{ url_for('about_page') }}" onclick="redirectTo(event, '{{ url_for('about_page') }}')">About</a></li>
                <li><a href="{{ url_for('help_page') }}" onclick="redirectTo(event, '{{ url_for('help_page') }}')">Help</a></li>
                <li><a href="{{ url_for('support_page') }}" onclick="redirectTo(event, '{{ url_for('support_page') }}')">Support</a></li>
            </ul>
        </nav>
    </header>

    <div class="support-container">
        <h1>Support</h1>
        <p>The Gmail collected by this feature will be secure, and once your issue is resolved, it will be automatically deleted.</p>
        <form id="supportForm">
            <input type="email" id="email" placeholder="Enter your Gmail" required>
            <textarea id="description" placeholder="Describe your issue..." required></textarea>
            <button type="submit">Submit</button>
        </form>
        <div class="thank-you-message" id="thankYouMessage">
            Thank you! We will get back to you soon.
        </div>
        <!-- Back Button -->
        <button class="back-button" onclick="window.location.href='{{ url_for("search_page") }}'">Back to Search</button>
    </div>

    <footer>
        <p>Explore new opportunities, unlock your potential, and take the next step with confidence.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const supportForm = document.getElementById("supportForm");
            const thankYouMessage = document.getElementById("thankYouMessage");

            supportForm.addEventListener("submit", function (event) {
                event.preventDefault();

                const email = document.getElementById("email").value;
                const description = document.getElementById("description").value;

                // First, save the data to the backend
                fetch("/save_support_data", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, description })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        console.log("Support data saved:", data);

                        // Now send the email
                        return fetch("/send_support_email", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ email, description })
                        });
                    } else {
                        throw new Error("Failed to save support data.");
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        supportForm.style.display = "none";
                        thankYouMessage.classList.add("show");
                    } else {
                        alert("Error sending email. Please try again.");
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("An error occurred. Please try again.");
                });
            });
        });
    </script>
</body>
</html>
